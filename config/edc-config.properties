# EDC controlplane configuration loaded from disk
# (mounted at /app/configuration.properties; pointed at via EDC_FS_CONFIG).
#
# This file exists for one reason: the EDC environment-variable translator
# converts "_" to "." but cannot produce "-". Any config key that contains
# a hyphen must therefore live in a properties file. Today that applies to
# the DCP default-scopes block below.
#
# Symptoms when this file is missing or not mounted:
#
#   verifier (peer) logs:
#     Unauthorized: Presentation Query failed: HTTP 403,
#       message: "Invalid query: requested Credentials outside of scope."
#
# What the verifier sees: this connector mints an STS token without a
# `bearer_access_scope`, so the outer JWT has no nested `token` claim, so
# the peer's Identity Hub has nothing to authorize against and rejects.

# --- Default IATP / DCP scopes ---
# These tell the connector which Verifiable Credentials to request from
# the peer when it acts as verifier, AND which to authorize the peer to
# read from us when it acts as verifier of us.
#
# Each named scope (membership, dataexchange, ...) maps to one credential
# type. The peer's Identity Hub must hold a credential of that type for
# the holder, otherwise the Presentation Query will return an empty list.

tx.edc.iam.iatp.default-scopes.membership.alias=org.eclipse.tractusx.vc.type
tx.edc.iam.iatp.default-scopes.membership.type=MembershipCredential
tx.edc.iam.iatp.default-scopes.membership.operation=read

tx.edc.iam.iatp.default-scopes.dataexchange.alias=org.eclipse.tractusx.vc.type
tx.edc.iam.iatp.default-scopes.dataexchange.type=DataExchangeGovernanceCredential
tx.edc.iam.iatp.default-scopes.dataexchange.operation=read

# Do NOT add BpnCredential here unless the operator confirms their holder
# returns it. If you ask for a credential the holder doesn't issue,
# Presentation Query fails with a "more credentials requested than
# returned" error.
